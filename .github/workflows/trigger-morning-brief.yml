name: Trigger Morning Brief (manual)

# Manual trigger for the Captain morning brief. Bypasses the 01:00-01:10 UTC
# cron time gate so we can validate format/content without waiting for the
# next natural fire. Useful when iterating on the prompt or extraction layer.

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client UUID. Default = Beaver Solutions."
        required: false
        default: "ce2fc8e5-617e-42d5-91fe-4275ceaa0030"

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger
        env:
          API_KEY: ${{ secrets.BEAVRDAM_INTERNAL_API_KEY }}
          CLIENT_ID: ${{ github.event.inputs.client_id }}
        run: |
          curl -sS -X POST "https://app.beaver.solutions/api/autonomous/trigger-morning-brief" \
            -H "x-internal-key: $API_KEY" \
            -H "content-type: application/json" \
            -d "{\"client_id\":\"$CLIENT_ID\"}" \
            | tee /tmp/result.json
          STATUS=$?
          echo ""
          echo "---"
          if [ $STATUS -ne 0 ]; then
            echo "curl failed with status $STATUS"
            exit $STATUS
          fi
          # Surface the preview text for the run log
          jq -r '.data.text_preview // .error // "no preview"' /tmp/result.json
