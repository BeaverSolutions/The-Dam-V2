name: Trigger Market Sensing (manual)

# Manual trigger for the Phase E market-sensing run. Bypasses the
# 00:30-00:40 UTC cron time gate so we can validate the source set +
# LLM extraction without waiting until tomorrow morning.

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client UUID. Default = Beaver Solutions."
        required: false
        default: "ce2fc8e5-617e-42d5-91fe-4275ceaa0030"

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Trigger
        env:
          API_KEY: ${{ secrets.BEAVRDAM_INTERNAL_API_KEY }}
          CLIENT_ID: ${{ github.event.inputs.client_id }}
        run: |
          curl -sS -X POST "https://app.beaver.solutions/api/autonomous/trigger-market-sensing" \
            -H "x-internal-key: $API_KEY" \
            -H "content-type: application/json" \
            --max-time 360 \
            -d "{\"client_id\":\"$CLIENT_ID\"}" \
            | tee /tmp/result.json
          STATUS=$?
          echo ""
          echo "---"
          if [ $STATUS -ne 0 ]; then
            echo "curl failed with status $STATUS"
            exit $STATUS
          fi
          echo "raw_results: $(jq -r '.data.raw_results_count' /tmp/result.json)"
          echo "opportunities: $(jq -r '.data.opportunities_count' /tmp/result.json)"
          echo "first 5:"
          jq -r '.data.opportunities[]? | "- \(.company // "?") | \(.signal_type // "?") | \(.signal_summary // "?") | \(.confidence // "?")"' /tmp/result.json
