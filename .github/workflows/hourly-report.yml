name: Hourly Status Report

on:
  schedule:
    # 01:07 to 11:07 UTC = 09:07 to 19:07 MYT (off the :00/:30 to avoid GitHub's cron congestion).
    - cron: '7 1-11 * * *'
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run hourly report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BEAVRDAM_INTERNAL_API_KEY: ${{ secrets.BEAVRDAM_INTERNAL_API_KEY }}
          BEAVRDAM_API_URL: https://app.beaver.solutions
        run: node scripts/hourly-report.mjs
