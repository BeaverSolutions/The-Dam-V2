name: Post-Deploy Autonomy Check

on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: 'Tenant slug to verify'
        required: true
        default: 'beaver-solutions'
      expect_daily_kickoff_enabled:
        description: 'Daily kickoff ARMED 2026-05-29 (MJ approved scheduled autonomy). Set false only if disarmed.'
        required: true
        default: 'true'
      expect_kpi_gap_kickoff_enabled:
        description: 'Manual override: true/false. Push checks use auto from /health scheduled worker state.'
        required: true
        default: 'false'
      expect_market_sensing_enabled:
        description: 'Set true only after MJ approves market-sensing spend'
        required: true
        default: 'false'
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run read-only post-deploy autonomy check
        env:
          BEAVRDAM_API_URL: ${{ secrets.BEAVRDAM_API_URL || 'https://app.beaver.solutions' }}
          BEAVRDAM_INTERNAL_API_KEY: ${{ secrets.BEAVRDAM_INTERNAL_API_KEY }}
          CLIENT_SLUG: ${{ github.event.inputs.client_slug || 'beaver-solutions' }}
          # Daily kickoff is ARMED (MJ approved scheduled autonomy 2026-05-29), so on push expect it ENABLED.
          # KPI-gap push checks use /health scheduled worker truth because env differs across deploy states.
          # Market sensing remains disabled unless explicitly approved.
          EXPECT_DAILY_KICKOFF_ENABLED: ${{ github.event.inputs.expect_daily_kickoff_enabled || 'true' }}
          EXPECT_KPI_GAP_KICKOFF_ENABLED: ${{ github.event_name == 'push' && 'auto' || github.event.inputs.expect_kpi_gap_kickoff_enabled || 'false' }}
          EXPECT_MARKET_SENSING_ENABLED: ${{ github.event.inputs.expect_market_sensing_enabled || 'false' }}
          WAIT_FOR_DEPLOY_SECONDS: ${{ github.event_name == 'push' && '720' || '0' }}
          FRESH_UPTIME_SECONDS: '180'
          WAIT_FOR_JOBS_SECONDS: '720'
        run: node scripts/post-deploy-autonomy-check.mjs
